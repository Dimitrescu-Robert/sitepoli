<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./cookie-consent.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PC1VMXYCRN"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PC1VMXYCRN');
    </script>
    <link rel="stylesheet" href="styles.css">
    <title>Simulare Admitere Mai 2026 | AdmiterePoli</title>
    <meta name="description" content="Simulare oficială de admitere AdmiterePoli — 9 mai 2026. Acces inclus în abonament sau disponibil individual pentru 30 RON.">
    <link rel="icon" type="image/png" href="logosquared.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        .sim-gate { max-width: 560px; margin: 4rem auto; padding: 2.5rem; background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.25rem; text-align: center; }
        .sim-gate-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
        .sim-gate-subtitle { color: var(--text-muted, #aaa); margin-bottom: 2rem; font-size: 1rem; }
        .sim-gate-badge { display: inline-block; background: var(--accent2); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 999px; margin-bottom: 1.25rem; letter-spacing: 0.04em; text-transform: uppercase; }
        .sim-gate-info { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .sim-gate-info-item { font-size: 0.9rem; color: var(--text-muted, #aaa); }
        .sim-gate-info-item strong { display: block; color: #fff; font-size: 1rem; margin-bottom: 0.2rem; }
        .sim-gate-btn { display: inline-block; padding: 0.85rem 2rem; border-radius: 0.75rem; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; transition: opacity 0.2s; text-decoration: none; }
        .sim-gate-btn-primary { background: var(--accent2); color: #fff; }
        .sim-gate-btn-primary:hover { opacity: 0.88; }
        .sim-gate-btn-locked { background: rgba(255,255,255,0.08); color: var(--text-muted, #aaa); cursor: default; }
        .sim-gate-btn-buy { background: var(--accent); color: #fff; }
        .sim-gate-btn-buy:hover { opacity: 0.88; }
        .sim-gate-note { margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted, #aaa); }
        .sim-gate-note a { color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body class="lp-body lp-dark">
    <header>
        <a href="./" class="nav-logo-link">
            <img src="images/logonoutrans.png" alt="logo" class="logonav">
        </a>
        <nav>
            <div id="nav-cursor" class="nav-cursor" aria-hidden="true"></div>
            <ul class="nav-elements">
                <li><a href="./informatii">Informații generale</a></li>
                <li><a href="./subiecte">Subiecte/Rezolvări</a></li>
                <li><a href="./resurse">Resurse</a></li>
                <li><a href="./simulari">Simulări</a></li>
                <li><a href="./exercitii-video">Exerciții video</a></li>
            </ul>
        </nav>
        <div class="nav-header-actions">
            <button class="nav-header-signup" id="header-signup-btn">Sign Up</button>
        </div>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </header>

    <main>
        <div class="grid-main-content">
            <section class="container">
                <div class="sim-gate" id="sim-gate">
                    <div class="sim-gate-badge">Simulare oficială</div>
                    <h1 class="sim-gate-title">Simulare Admitere Mai 2026</h1>
                    <p class="sim-gate-subtitle">Testează-te în condiții reale de examen — matematică și informatică.</p>
                    <div class="sim-gate-info">
                        <div class="sim-gate-info-item">
                            <strong>9 mai 2026, 10:00</strong>
                            Data simulării
                        </div>
                        <div class="sim-gate-info-item">
                            <strong>3 ore</strong>
                            Durata
                        </div>
                        <div class="sim-gate-info-item">
                            <strong>20 subiecte</strong>
                            Matematică + Informatică
                        </div>
                    </div>
                    <div id="sim-gate-action">
                        <button class="sim-gate-btn sim-gate-btn-locked" disabled>Se încarcă...</button>
                    </div>
                    <p class="sim-gate-note" id="sim-gate-note"></p>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAml8nJ8UOh9wrIhI6f-3K6-tOaPYLz_c4",
            authDomain: "admiterepoli-715cb.firebaseapp.com",
            projectId: "admiterepoli-715cb",
            storageBucket: "admiterepoli-715cb.firebasestorage.app",
            messagingSenderId: "91434186818",
            appId: "1:91434186818:web:1617d5a2d53b2fea2a95db"
        };

        const SALE_DEADLINE = new Date("2026-05-09T07:00:00Z"); // 10:00 EEST
        const GUMROAD_BASE  = "https://admiterepoli.gumroad.com/l/simulare-mai-2025";

        const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app, 'admiterepoli');

        const actionEl = document.getElementById('sim-gate-action');
        const noteEl   = document.getElementById('sim-gate-note');

        function renderAction(html, note = '') {
            actionEl.innerHTML = html;
            noteEl.innerHTML   = note;
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                renderAction(
                    `<button class="sim-gate-btn sim-gate-btn-primary" id="btn-login-gate">Autentifică-te pentru acces</button>`,
                    'Ai nevoie de un cont pentru a accesa simularea.'
                );
                document.getElementById('btn-login-gate').addEventListener('click', () => {
                    if (window.openModal) {
                        window.openModal();
                    } else {
                        document.getElementById('header-signup-btn')?.click();
                    }
                });
                return;
            }

            let status = 'free';
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) status = snap.data().status || 'free';
            } catch { /* fallback la free */ }

            const hasAccess = status === 'paid' || status === 'pending_cancellation' || status === 'trial';
            const isPending = status === 'trial_pending';

            if (hasAccess) {
                renderAction(
                    `<a href="#quiz-area" class="sim-gate-btn sim-gate-btn-primary">Intră în simulare</a>`
                );
                return;
            }

            if (isPending) {
                renderAction(
                    `<button class="sim-gate-btn sim-gate-btn-locked" disabled>Accesul se activează pe 9 mai, ora 08:00</button>`,
                    'Ai cumpărat accesul. Simularea se deschide pe 9 mai la ora 08:00.'
                );
                return;
            }

            // status: free
            const now = new Date();
            if (now < SALE_DEADLINE) {
                const gumroadUrl = `${GUMROAD_BASE}?wanted=true&email=${encodeURIComponent(user.email)}`;
                renderAction(
                    `<a href="${gumroadUrl}" class="sim-gate-btn sim-gate-btn-buy" target="_blank" rel="noopener noreferrer">Cumpără acces · 30 RON</a>`,
                    'Include 3 zile acces la toate resursele premium (9 mai – 12 mai).'
                );
            } else {
                renderAction(
                    `<button class="sim-gate-btn sim-gate-btn-locked" disabled>Vânzările s-au închis</button>`,
                    'Simularea a început. Accesul nu mai este disponibil pentru cumpărare.'
                );
            }
        });
    </script>

    <script type="module" src="./firebase-auth.js"></script>
    <script src="./main.js"></script>
</body>
</html>
